<!DOCTYPE html>
<html>
<head>
  <title>Register - GDG CIT</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://gdgmgm.vercel.app/logo.png">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <img src="https://miro.medium.com/v2/resize:fit:1200/1*4YZ4tOc5oRs_Ksx-R_WFMw.png" height="30px">
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="events.html">Events</a>
    <a href="gallery.html">Photos</a>
    <a href="register.html">Register</a>
  </div>
</div>

<!-- REGISTER -->
<div class="register-wrapper">

  <div class="register-box">

    <h1 id="he3">Event Registration</h1>
    <p class="sub-text" style="text-align:center;"><b>Fill in your details to participate</b></p><hr><br>

    <form class="register-form" onsubmit="handleSubmit(event)">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="Enter phone number" required>
      </div>

      <div class="form-group">
        <label>College Name</label>
        <input type="text" placeholder="Enter your college" required>
      </div>

      <div class="form-group">
        <label>Select Event</label>
        <select id="eventSelect" required>
          <option value="">Select Event</option>
        </select>
      </div>

      <div class="form-group">
        <label>Team Size</label>
        <select required>
          <option value="">Choose</option>
          <option>1 Member</option>
          <option>2 Members</option>
          <option>3 Members</option>
          <option>4 Members</option>
        </select>
      </div>

      <button type="submit">Register Now</button>

    </form>

    <p class="success-msg" id="successMsg">
      ✅ Registration Successful!
    </p>

  </div>

</div>

<!-- SCRIPT -->
<script>

// upcoming event only
const upcomingEvents = [
  "Solution Challenge 2026"
];

const select = document.getElementById("eventSelect");

upcomingEvents.forEach(event => {
  let option = document.createElement("option");
  option.text = event;
  option.value = event;
  select.appendChild(option);
});

function handleSubmit(e) {
  e.preventDefault();
  document.getElementById("successMsg").style.display = "block";

  setTimeout(() => {
    document.querySelector(".register-form").reset();
  }, 1000);
}

</script>

</body>
</html>
